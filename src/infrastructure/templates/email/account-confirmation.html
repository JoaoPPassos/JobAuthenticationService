<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirme sua conta</title>
</head>
<body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="background:#0f172a;padding:24px;text-align:center;color:#ffffff;font-size:22px;font-weight:700;">
              {{APP_NAME}}
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <h1 style="margin:0 0 12px 0;font-size:24px;line-height:1.3;">Confirmação de conta</h1>
              <p style="margin:0 0 16px 0;font-size:16px;line-height:1.6;">Olá, {{USER_NAME}}.</p>
              <p style="margin:0 0 24px 0;font-size:16px;line-height:1.6;">
                Para ativar sua conta, clique no botão abaixo e confirme seu e-mail.
              </p>
              <p style="margin:0 0 24px 0;text-align:center;">
                <a href="{{CONFIRMATION_URL}}" style="display:inline-block;padding:12px 20px;background:#2563eb;color:#ffffff;text-decoration:none;border-radius:8px;font-size:15px;font-weight:600;">
                  Confirmar minha conta
                </a>
              </p>
              <p style="margin:0 0 8px 0;font-size:14px;line-height:1.6;color:#4b5563;">
                Se o botão não funcionar, copie e cole este link no navegador:
              </p>
              <p style="margin:0;font-size:14px;line-height:1.6;word-break:break-all;color:#2563eb;">
                {{CONFIRMATION_URL}}
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px;background:#f8fafc;font-size:12px;line-height:1.6;color:#6b7280;text-align:center;">
              Se você não criou esta conta, ignore este e-mail.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
